<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailers - CineCatálogo</title>
  <meta name="description" content="Assista aos últimos trailers de filmes">
  <link rel="stylesheet" href="style.css">
  <style>
    .trailers-page {
      padding: 24px 16px;
      min-height: 70vh;
    }
    
    .page-header {
      margin-bottom: 32px;
    }
    
    .page-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 16px;
      border-left: 4px solid var(--primary-color);
      padding-left: 12px;
      color: var(--text-white);
    }
    
    @media (min-width: 768px) {
      .page-title {
        font-size: 2rem;
      }
    }
    
    .trailer-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    
    @media (min-width: 768px) {
      .trailer-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 1024px) {
      .trailer-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    .trailer-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s;
    }
    
    .trailer-card:hover {
      transform: translateY(-5px);
    }
    
    .trailer-card .trailer-container {
      aspect-ratio: 16/9;
    }
    
    .trailer-card-info {
      padding: 16px;
    }
    
    .trailer-card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .trailer-card-meta {
      color: var(--text-gray);
      font-size: 0.85rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .back-link {
      display: inline-block;
      color: var(--text-light);
      margin-bottom: 16px;
      transition: color 0.3s;
    }
    
    .back-link:hover {
      color: var(--primary-color);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1 class="logo" onclick="window.location.href='index.html'">🎬 CineCatálogo</h1>
        <a href="index.html" class="back-link">← Voltar para Home</a>
      </div>
    </div>
  </header>

  <main class="trailers-page container">
    <div class="page-header">
      <h2 class="page-title">🎥 Últimos Trailers</h2>
      <p style="color: var(--text-gray);">Assista aos trailers dos filmes mais populares</p>
    </div>
    <div id="trailersGrid" class="trailer-grid">
      <div class="loading">🎬 Carregando trailers...</div>
    </div>
  </main>

  <footer class="footer">
    <p>🎬 CineCatálogo © <span id="year"></span> | Dados: <a href="https://www.themoviedb.org/" target="_blank" style="color: var(--primary-color);">TMDB</a></p>
  </footer>

  <script>
    // ========================================
    // CONFIGURAÇÕES DA API
    // ========================================
    const API_KEY = 'd6034ac010f3fce6e88a7ac9c3f02326';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';
    
    document.getElementById('year').textContent = new Date().getFullYear();
    
    // ========================================
    // CARREGAR TRAILERS
    // ========================================
    async function loadTrailers() {
      try {
        const popular = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=pt-BR`).then(r => r.json());
        
        const trailersGrid = document.getElementById('trailersGrid');
        const trailers = [];
        
        for (const movie of popular.results.slice(0, 20)) {
          const videos = await fetch(`${BASE_URL}/movie/${movie.id}/videos?api_key=${API_KEY}`).then(r => r.json());
          const trailer = videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
          
          if (trailer && movie.poster_path) {
            trailers.push({
              movie: movie,
              trailer: trailer
            });
          }
        }
        
        if (trailers.length === 0) {
          trailersGrid.innerHTML = '<p class="error">😕 Nenhum trailer encontrado</p>';
          return;
        }
        
        trailersGrid.innerHTML = trailers.map(item => `
          <div class="trailer-card">
            <div class="trailer-container">
              <iframe 
                src="https://www.youtube.com/embed/${item.trailer.key}?rel=0&modestbranding=1" 
                title="${item.trailer.name}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen
                loading="lazy"
              ></iframe>
            </div>
            <div class="trailer-card-info">
              <h3 class="trailer-card-title">${item.movie.title}</h3>
              <p class="trailer-card-meta">
                <span>📅 ${item.movie.release_date?.split('-')[0] || 'N/A'}</span>
                <span>⭐ ${item.movie.vote_average?.toFixed(1) || 'N/A'}</span>
              </p>
            </div>
          </div>
        `).join('');
        
      } catch (error) {
        console.error('Erro ao carregar trailers:', error);
        document.getElementById('trailersGrid').innerHTML = '<p class="error">❌ Erro ao carregar trailers</p>';
      }
    }
    
    loadTrailers();
  </script>
</body>
</html>
